<script>

const ctx=document.getElementById('scenarioChart');

const chart=new Chart(ctx,{
type:'bar',
data:{
labels:['Productivity','GDP Growth','Employment'],
datasets:[{
label:'Baseline',
data:[8,1.5,7]
}]
}
});

function updateChart(type){

if(type==='baseline'){
chart.data.datasets[0].data=[8,1.5,7];
chart.data.datasets[0].label='Baseline';
}

if(type==='upside'){
chart.data.datasets[0].data=[15,3,10];
chart.data.datasets[0].label='Upside';
}

if(type==='downside'){
chart.data.datasets[0].data=[5,0.5,4];
chart.data.datasets[0].label='Downside';
}

chart.update();

}

</script>
