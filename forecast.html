<script>

let currentScenario = "baseline";

const ctx = document.getElementById('scenarioChart');

const chart = new Chart(ctx,{
type:'bar',
data:{
labels:['Productivity','GDP Growth','Employment'],
datasets:[{
label:'Baseline',
data:[8,1.5,7]
}]
}
});

function updateChart(type){

currentScenario = type;

let data;

if(type==='baseline'){
data = [8,1.5,7];
}

if(type==='upside'){
data = [15,3,10];
}

if(type==='downside'){
data = [5,0.5,4];
}

chart.data.datasets[0].data = data;
chart.data.datasets[0].label = type.charAt(0).toUpperCase() + type.slice(1);

chart.update();

}

function updateSlider(){

let value = document.getElementById("slider").value;
document.getElementById("sliderValue").innerHTML = value + "%";

// base scenario values
let base;

if(currentScenario === "baseline"){
base = [8,1.5,7];
}

if(currentScenario === "upside"){
base = [15,3,10];
}

if(currentScenario === "downside"){
base = [5,0.5,4];
}

// AI impact model
let productivity = base[0] * (0.5 + value/100);
let gdp = base[1] * (0.5 + value/100);
let employment = base[2] * (1 - value/200);

// update chart
chart.data.datasets[0].data = [
productivity.toFixed(1),
gdp.toFixed(2),
employment.toFixed(1)
];

chart.data.datasets[0].label = currentScenario + " + AI impact";

chart.update();

}

</script>
